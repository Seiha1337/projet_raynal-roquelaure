[env:wt32-eth01]
platform = espressif32
board = wt32-eth01
framework = arduino
monitor_speed = 115200

lib_deps = 
    emelianov/modbus-esp8266@^4.1.0
    bodmer/TFT_eSPI@^2.5.43

build_flags = 
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MISO=-1
    -D TFT_MOSI=12
    -D TFT_SCLK=15
    -D TFT_CS=-1
    -D TFT_DC=33
    -D TFT_RST=32
    -D TFT_BL=14
    -D DISABLE_ALL_LIBRARY_WARNINGS=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=27000000